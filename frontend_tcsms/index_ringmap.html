<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교산·하남·남한강·양평 링 지도 통합 UI</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="./fhd-layout.css" />
  <style>
    :root {
      --bg: #f4f6f9;
      --panel: rgba(255, 255, 255, 0.95);
      --panel2: rgba(255, 255, 255, 0.96);
      --line: rgba(0,0,0,0.10);
      --text: #1a2636;
      --muted: #5a7a9a;
      --accent: #137fec;
      --success: rgba(22,163,74,0.80);
      --wait: rgba(202,138,4,0.80);
      --active: rgba(37,99,235,0.90);
    }
    * { box-sizing: border-box; }
    html, body { margin:0; height:100%; background:var(--bg); color:var(--text); font-family: Arial, "Noto Sans KR", sans-serif; }
    .app { display:grid; grid-template-columns: 380px 1fr; height:100%; }
    .sidebar {
      background: linear-gradient(180deg, #ffffff, #f4f6f9);
      border-right:1px solid var(--line);
      padding:16px;
      overflow:auto;
    }
    .title { font-size: 24px; font-weight: 800; letter-spacing:-0.02em; margin:0 0 6px; }
    .subtitle { color:var(--muted); font-size:13px; line-height:1.5; margin-bottom:14px; }
    .toolbar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
    .btn, .file-label {
      display:inline-flex; align-items:center; justify-content:center; gap:6px;
      border:1px solid var(--line); background:#e8edf4; color:var(--text);
      border-radius:10px; padding:9px 12px; cursor:pointer; font-size:13px; text-decoration:none;
    }
    .btn:hover, .file-label:hover { background:#d8e3ef; }
    .btn.primary { background:rgba(19,127,236,.12); border-color:rgba(19,127,236,.35); color:#137fec; }
    .btn.active { outline:2px solid rgba(19,127,236,.55); }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:14px; margin-bottom:12px; }
    .project-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px; }
    .project-name { font-weight:800; font-size:18px; }
    .badge { padding:4px 8px; border-radius:999px; font-size:12px; border:1px solid var(--line); color:var(--muted); }
    .row { display:flex; gap:8px; margin:8px 0; }
    .row > * { flex:1; }
    input[type="number"], input[type="text"] {
      width:100%; background:#f0f3f7; border:1px solid var(--line); color:var(--text);
      border-radius:10px; padding:10px 11px; font-size:13px;
    }
    input[type="file"] { display:none; }
    .help { color:var(--muted); font-size:12px; line-height:1.45; }
    .stats { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:8px; margin-top:8px; }
    .stat { background:#f0f3f7; border:1px solid var(--line); border-radius:12px; padding:10px; }
    .stat .k { font-size:11px; color:var(--muted); margin-bottom:4px; }
    .stat .v { font-size:16px; font-weight:800; }
    #mapWrap { position:relative; }
    #map { height:100%; width:100%; }
    .topbar {
      position:absolute; top:14px; left:14px; right:14px; z-index:1000;
      display:flex; justify-content:space-between; gap:12px; pointer-events:none;
    }
    .topbar > * { pointer-events:auto; }
    .floating {
      background:var(--panel2); border:1px solid var(--line); border-radius:14px; padding:10px 12px;
      backdrop-filter: blur(8px); box-shadow:0 12px 30px rgba(0,0,0,.24);
    }
    .legend { display:flex; align-items:center; gap:12px; flex-wrap:wrap; font-size:12px; color:var(--muted); }
    .legend i { width:12px; height:12px; border-radius:999px; display:inline-block; margin-right:5px; border:1px solid rgba(0,0,0,.5); vertical-align:-1px; }
    .summary { display:grid; grid-template-columns: repeat(4, minmax(110px,1fr)); gap:10px; }
    .summary .box { background:#f0f3f7; border:1px solid var(--line); border-radius:12px; padding:10px 12px; min-width:100px; }
    .summary .label { font-size:11px; color:var(--muted); margin-bottom:4px; }
    .summary .value { font-size:18px; font-weight:800; }
    .leaflet-tooltip.ring-hover {
      background: rgba(255,255,255,0.97);
      color: #1a2636;
      border: 1px solid rgba(0,0,0,.12);
      border-radius: 8px;
      box-shadow: 0 8px 18px rgba(0,0,0,.12);
      padding: 8px 10px;
    }
    .leaflet-tooltip.ring-hover::before { border-top-color: rgba(255,255,255,0.97); }
    .active-label {
      background: rgba(255,255,255,0.97);
      color:#1a2636; border:1px solid rgba(19,127,236,.4); border-radius:8px; padding:8px 10px;
      font-size:12px; line-height:1.45; box-shadow:0 10px 20px rgba(0,0,0,.12);
    }
    .active-label strong { color:#137fec; }
    @keyframes blinkOpacity {
      0%, 100% { fill-opacity: .92; opacity:1; }
      50% { fill-opacity: .24; opacity:.55; }
    }
    .ring-blink { animation: blinkOpacity 1.1s infinite; }
    @media (max-width: 1200px) {
      .app { grid-template-columns: 330px 1fr; }
      .summary { grid-template-columns: repeat(2, minmax(110px,1fr)); }
    }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      .sidebar { max-height: 44vh; }
      .topbar { left:10px; right:10px; top:10px; flex-direction:column; }
    }
  </style>

  <style>
    body.embed-mode .app { grid-template-columns: 1fr; }
    body.embed-mode .sidebar { display:none; }
    body.embed-mode .topbar { left:12px; right:12px; top:12px; }
    body.embed-mode .summary { grid-template-columns: repeat(4, minmax(88px,1fr)); }
    body.embed-mode .summary .box { padding:8px 10px; }
    body.embed-mode .summary .label { font-size:11px; }
    body.embed-mode .summary .value { font-size:16px; }
    body.embed-mode .legend { gap:8px; font-size:11px; }
    body.embed-mode .floating { padding:8px 10px; }
    body.embed-mode .leaflet-control-container .leaflet-top.leaflet-left { top:56px; }
    @media (max-width: 900px){
      body.embed-mode .summary { grid-template-columns: repeat(2, minmax(88px,1fr)); }
    }
  </style>


  <style>
    body.drawer-mode .app { grid-template-columns: 1fr; }
    body.drawer-mode .sidebar {
      position:absolute; left:16px; top:16px; bottom:16px; width:min(380px, calc(100vw - 32px)); z-index:1400;
      border:1px solid var(--line); border-radius:18px; box-shadow:0 20px 40px rgba(0,0,0,.35);
      transition:transform .25s ease, opacity .25s ease; overflow:auto;
    }
    body.drawer-mode .sidebar.is-collapsed { transform:translateX(calc(-100% - 24px)); opacity:.18; pointer-events:none; }
    .sidebar-toggle {
      position:absolute; left:14px; bottom:18px; z-index:1500; display:none; align-items:center; justify-content:center;
      width:48px; height:48px; border-radius:14px; border:1px solid var(--line);
      background:rgba(255,255,255,.96); color:var(--text); box-shadow:0 12px 24px rgba(0,0,0,.12); cursor:pointer;
      backdrop-filter: blur(8px);
    }
    .sidebar-toggle:hover { background:#e8edf4; }
    body.drawer-mode .sidebar-toggle { display:inline-flex; }
    body.embed-mode .sidebar-toggle { display:none; }
  </style>

  <style>
  /* ★ 모바일 팝업/툴팁/라벨 숨김 */
  @media (max-width: 767px) {
    .leaflet-tooltip { display: none !important; }
    .active-label { display: none !important; }
    #tourOverlay { display: none !important; }
    #summaryBar { display: none !important; }
    .topbar .floating.legend { display: none !important; }
  }

  /* 범례 + 요약바 안겹침 */
  .topbar {
    align-items: flex-start !important;
    flex-wrap: nowrap !important;
  }
  .topbar .floating.legend {
    flex-shrink: 1 !important;
    min-width: 0 !important;
    max-width: 220px !important;
  }
  #summaryBar {
    flex-shrink: 0 !important;
  }
  .summary {
    grid-template-columns: repeat(4, minmax(80px, 1fr)) !important;
    gap: 8px !important;
  }
  .upload-preview-overlay {
    position: fixed;
    inset: 0;
    z-index: 5000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(2, 6, 23, 0.72);
    backdrop-filter: blur(6px);
  }
  .upload-preview-overlay.is-open { display: flex; }
  .upload-preview-modal {
    width: min(1080px, 100%);
    max-height: calc(100vh - 48px);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border-radius: 20px;
    background: #fff;
    border: 1px solid rgba(0,0,0,.12);
    box-shadow: 0 30px 80px rgba(0,0,0,.28);
  }
  .upload-preview-head, .upload-preview-actions {
    padding: 16px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(0,0,0,.08);
  }
  .upload-preview-actions {
    border-top: 1px solid rgba(0,0,0,.08);
    border-bottom: none;
  }
  .upload-preview-title { font-size: 18px; font-weight: 900; color: #0f172a; }
  .upload-preview-sub { color: #334155; font-size: 12px; font-weight: 700; margin-top: 4px; }
  .upload-preview-body { padding: 16px 18px; overflow: auto; display: flex; flex-direction: column; gap: 14px; }
  .upload-preview-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
  .upload-preview-box { border: 1px solid rgba(0,0,0,.08); border-radius: 14px; background: #f8fafc; padding: 12px; }
  .upload-preview-box .k { color: #334155; font-size: 11px; font-weight: 700; margin-bottom: 4px; }
  .upload-preview-box .v { font-size: 18px; font-weight: 900; color: #0f172a; }
  .upload-preview-note { color: #334155; font-size: 12px; font-weight: 600; line-height: 1.6; border-radius: 14px; background: #eff6ff; border: 1px solid rgba(59,130,246,.18); padding: 12px 14px; }
  .upload-preview-status { display:none; border-radius:14px; padding:12px 14px; font-size:12px; font-weight:700; line-height:1.6; }
  .upload-preview-status.is-open { display:block; }
  .upload-preview-status.info { background:#eff6ff; border:1px solid rgba(59,130,246,.18); color:#1d4ed8; }
  .upload-preview-status.error { background:#fef2f2; border:1px solid rgba(239,68,68,.18); color:#b91c1c; }
  .upload-preview-status.success { background:#ecfdf5; border:1px solid rgba(34,197,94,.18); color:#166534; }
  .upload-preview-table-wrap { border: 1px solid rgba(0,0,0,.08); border-radius: 14px; overflow: auto; }
  .upload-preview-table { width: 100%; border-collapse: collapse; min-width: 720px; }
  .upload-preview-table th, .upload-preview-table td { padding: 10px 12px; border-bottom: 1px solid rgba(0,0,0,.06); text-align: left; font-size: 12px; }
  .upload-preview-table th { background: #f8fafc; color: #1e293b; font-weight: 800; position: sticky; top: 0; z-index: 1; }
  .upload-preview-table td { color: #334155; font-weight: 600; }
  #uploadPreviewConfirm {
    background: #2563eb;
    border-color: #1d4ed8;
    color: #ffffff;
    font-weight: 900;
  }
  #uploadPreviewConfirm:hover {
    background: #1d4ed8;
    border-color: #1e40af;
    color: #ffffff;
  }
  #uploadPreviewConfirm:disabled {
    background: #93c5fd;
    border-color: #93c5fd;
    color: #eff6ff;
  }
  .upload-preview-table tr:last-child td { border-bottom: none; }
  .upload-preview-row-invalid { background: rgba(254, 226, 226, 0.7); }
  .upload-preview-chip { display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:5px 10px; font-size:11px; font-weight:700; }
  .upload-preview-chip.valid { background:#dcfce7; color:#166534; }
  .upload-preview-chip.invalid { background:#fee2e2; color:#991b1b; }
  @media (max-width: 900px) {
    .upload-preview-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .upload-preview-head, .upload-preview-actions { flex-direction: column; align-items: stretch; }
  }
  </style>

  <style id="ringmap-theme-dark">
  /* 다크 테마 */
  :root {
    --bg: #0b1220;
    --panel: rgba(10,18,32,0.88);
    --panel2: rgba(17,24,39,0.92);
    --line: rgba(255,255,255,0.12);
    --text: #e5eefc;
    --muted: #9fb2cf;
  }
  html, body { background: #0b1220 !important; color: #e5eefc !important; }
  .sidebar { background: linear-gradient(180deg, rgba(2,6,23,.96), rgba(15,23,42,.94)) !important; border-right: 1px solid rgba(255,255,255,0.12) !important; }
  .btn, .file-label { background: rgba(255,255,255,.05) !important; color: #e5eefc !important; border: 1px solid rgba(255,255,255,0.12) !important; }
  .btn:hover, .file-label:hover { background: rgba(255,255,255,.10) !important; }
  .btn.primary { background: rgba(59,130,246,.18) !important; border: 1px solid rgba(96,165,250,.38) !important; color: #93c5fd !important; }
  .btn.active { outline: 2px solid rgba(96,165,250,.55) !important; }
  .panel { background: rgba(10,18,32,0.88) !important; border: 1px solid rgba(255,255,255,0.12) !important; }
  .stat { background: rgba(255,255,255,.04) !important; border: 1px solid rgba(255,255,255,0.12) !important; }
  .summary .box { background: rgba(255,255,255,.04) !important; border: 1px solid rgba(255,255,255,0.12) !important; }
  input[type="number"], input[type="text"] { background: rgba(255,255,255,.05) !important; color: #e5eefc !important; border: 1px solid rgba(255,255,255,0.12) !important; }
  .floating { background: rgba(17,24,39,0.92) !important; border: 1px solid rgba(255,255,255,0.12) !important; }
  .badge { border: 1px solid rgba(255,255,255,0.12) !important; color: #9fb2cf !important; }
  .leaflet-tooltip.ring-hover { background: rgba(15,23,42,0.96) !important; color: #fff !important; border: 1px solid rgba(255,255,255,.18) !important; }
  .leaflet-tooltip.ring-hover::before { border-top-color: rgba(15,23,42,0.96) !important; }
  .active-label { background: rgba(15,23,42,0.96) !important; color: #fff !important; border: 1px solid rgba(59,130,246,.65) !important; }
  .active-label strong { color: #93c5fd !important; }
  .sidebar-toggle { background: rgba(17,24,39,.92) !important; border: 1px solid rgba(255,255,255,0.12) !important; }
  .sidebar-toggle:hover { background: rgba(30,41,59,.96) !important; }
  /* summary topbar */
  #summaryBar { background: transparent !important; }
  #summaryBar .box { background: rgba(255,255,255,.04) !important; border: 1px solid rgba(255,255,255,0.12) !important; }
  #summaryBar .label { color: #9fb2cf !important; }
  #summaryBar .value { color: #e5eefc !important; }
  /* legend */
  .legend { color: #9fb2cf !important; }
  /* 텍스트 */
  .stat .k { color: #9fb2cf !important; }
  .stat .v { color: #e5eefc !important; }
  .help { color: #9fb2cf !important; }
  .subtitle { color: #9fb2cf !important; }
  .title { color: #e5eefc !important; }
  .project-name { color: #e5eefc !important; }
  .summary .label { color: #9fb2cf !important; }
  .summary .value { color: #e5eefc !important; }
  </style>

</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h1 class="title">링 지도 통합 업로드 UI</h1>
    <div class="subtitle">교산 · 하남 · 남한강 · 양평 엑셀을 각각 업로드하거나 다시 업로드하면 바로 지도에 갱신됩니다. 완료 링 번호를 넣으면 완료/대기/진행중 상태가 자동 반영됩니다.</div>

    <div class="toolbar">
      <button class="btn primary active" data-focus="ALL">전체 보기</button>
      <button class="btn" data-focus="교산">교산</button>
      <button class="btn" data-focus="하남">하남</button>
      <button class="btn" data-focus="남한강">남한강</button>
      <button class="btn" data-focus="양평">양평</button>
    </div>

    <div class="panel">
      <div class="row">
        <button class="btn primary" id="btnSatellite">위성지도</button>
        <button class="btn" id="btnRoad">일반지도</button>
      </div>
      <div class="row">
        <button class="btn" id="btnFitAll">전체 링 맞춤</button>
        <button class="btn" id="btnClearAll">전체 초기화</button>
      </div>
      <div class="help">권장 컬럼명: <b>링번호</b>, <b>체인리지</b>, <b>위도</b>, <b>경도</b>. 영문 컬럼도 자동 인식합니다. 여러 시트가 있어도 유효한 좌표가 있는 행은 모두 읽습니다.</div>
    </div>

    <div id="projectPanels"></div>
  </aside>

  <main id="mapWrap">
    <div class="topbar">
      <div class="floating legend">
        <span><i style="background: var(--success)"></i>완료</span>
        <span><i style="background: var(--wait)"></i>대기</span>
        <span><i style="background: var(--active)"></i>진행중</span>
        <span><i style="background: rgba(0,0,0,.12)"></i>검정 외곽선 50%</span>
      </div>
      <div class="floating summary" id="summaryBar"></div>
    </div>
    <div id="map"></div>
    <button id="sidebarToggle" class="sidebar-toggle" title="사이드바 열기/닫기">☰</button>
  </main>
</div>

<div id="uploadPreviewOverlay" class="upload-preview-overlay" aria-hidden="true">
  <div class="upload-preview-modal">
    <div class="upload-preview-head">
      <div>
        <div id="uploadPreviewTitle" class="upload-preview-title">링좌표 업로드 미리보기</div>
        <div id="uploadPreviewSub" class="upload-preview-sub">파일 파싱 결과를 확인한 뒤 서버 저장을 진행합니다.</div>
      </div>
      <button id="uploadPreviewClose" class="btn" type="button">닫기</button>
    </div>
    <div class="upload-preview-body">
      <div id="uploadPreviewSummary" class="upload-preview-grid"></div>
      <div id="uploadPreviewNote" class="upload-preview-note"></div>
      <div id="uploadPreviewStatus" class="upload-preview-status"></div>
      <div class="upload-preview-table-wrap">
        <table class="upload-preview-table">
          <thead>
            <tr>
              <th>#</th>
              <th>상태</th>
              <th>구간</th>
              <th>링번호</th>
              <th>체인리지</th>
              <th>위도</th>
              <th>경도</th>
              <th>비고</th>
            </tr>
          </thead>
          <tbody id="uploadPreviewRows"></tbody>
        </table>
      </div>
    </div>
    <div class="upload-preview-actions">
      <div id="uploadPreviewFooter" class="upload-preview-sub">유효한 좌표만 서버에 저장됩니다.</div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button id="uploadPreviewCancel" class="btn" type="button">취소</button>
        <button id="uploadPreviewConfirm" class="btn primary" type="button">서버 저장</button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const isEmbedMode = urlParams.get('embed') === '1';
  const initialBasemap = urlParams.get('basemap') === 'map' ? 'map' : 'sat';
  const drawerMode = !isEmbedMode;
  if (isEmbedMode) document.body.classList.add('embed-mode');
  if (drawerMode) document.body.classList.add('drawer-mode');

  // ── 테마 초기화: localStorage 기준, 기본값 dark ──
  function applyRingmapTheme(dark) {
    const darkStyle = document.getElementById('ringmap-theme-dark');
    if (darkStyle) darkStyle.disabled = !dark;
    localStorage.setItem('tcsms-theme', dark ? 'dark' : 'light');
  }
  const savedTheme = localStorage.getItem('tcsms-theme');
  applyRingmapTheme(savedTheme !== 'light'); // 기본값 dark

  const PROJECTS = [
    { key: 'GY', name: '교산' },
    { key: 'HN', name: '하남' },
    { key: 'NH', name: '남한강' },
    { key: 'YP', name: '양평' }
  ];
  const PROJECT_BY_NAME = Object.fromEntries(PROJECTS.map(project => [project.name, project]));
  const PROJECT_SEGMENTS = {
    GY: ['0-1', '0-2'],
    HN: ['1-1', '1-2', '1-3', '1-4', '1-5'],
    NH: ['2-1', '2-2', '2-3', '2-4'],
    YP: ['3-1', '3-2', '3-3', '3-4']
  };
  const EMPTY_PROJECT_STATE = () => ({ rows: [], completedRing: '', fileName: '', shaftLocations: [] });
  const pendingUploads = {};

  const COLORS = {
    done: 'rgba(34,197,94,0.72)',
    wait: 'rgba(250,204,21,0.72)',
    active: 'rgba(59,130,246,0.88)',
    outline: 'rgba(0,0,0,0.5)'
  };
  const PROJECT_COLORS = {
    '교산': '#D9C400',
    '하남': '#D94A3A',
    '남한강': '#5FAE4E',
    '양평': '#4A78D1'
  };

  const map = L.map('map', { zoomControl: true, preferCanvas: true }).setView([37.53, 127.18], 14);
  const roadLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 21, attribution: '&copy; OpenStreetMap' });
  const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 21, attribution: 'Esri' });
  if (initialBasemap === 'map') { roadLayer.addTo(map); } else { satLayer.addTo(map); }


  function setBasemap(mode) {
    const useMap = mode === 'map';
    if (useMap) {
      if (map.hasLayer(satLayer)) map.removeLayer(satLayer);
      if (!map.hasLayer(roadLayer)) roadLayer.addTo(map);
    } else {
      if (map.hasLayer(roadLayer)) map.removeLayer(roadLayer);
      if (!map.hasLayer(satLayer)) satLayer.addTo(map);
    }
    const satBtn = document.getElementById('btnSatellite');
    const roadBtn = document.getElementById('btnRoad');
    if (satBtn) satBtn.classList.toggle('active', !useMap);
    if (roadBtn) roadBtn.classList.toggle('active', useMap);
  }

  const groupByProject = {};
  const activeHighlightLayer = L.layerGroup().addTo(map);
  const state = {
    focus: 'ALL',
    focusSections: {},
    projects: Object.fromEntries(PROJECTS.map(p => [p.name, EMPTY_PROJECT_STATE()]))
  };

  PROJECTS.forEach(p => {
    groupByProject[p.name] = {
      root: L.layerGroup().addTo(map),
      circles: [],
      activeLabel: null,
      hoverTooltipTargets: []
    };
  });

  function saveState() {
    localStorage.setItem('ringMapProjectsStateV1', JSON.stringify({
      focus: state.focus,
      focusSections: {},
      projects: state.projects
    }));
  }
  function loadState() {
    try {
      const raw = localStorage.getItem('ringMapProjectsStateV1');
      if (!raw) return;
      const parsed = JSON.parse(raw);
      if (parsed && parsed.projects) {
        state.focus = parsed.focus || 'ALL';
        state.focusSections = {};
        for (const name of Object.keys(state.projects)) {
          if (parsed.projects[name]) state.projects[name] = parsed.projects[name];
        }
      }
    } catch (e) { console.warn(e); }
  }

  function getRowSectionNumber(row) {
    if (!row || typeof row !== 'object') return '';
    return String(row.sectionNumber || row.segmentNumber || '').trim();
  }

  function getFocusedSection(projectName) {
    return String((state.focusSections && state.focusSections[projectName]) || '').trim();
  }

  function getProjectRows(projectName) {
    const rows = Array.isArray(state.projects[projectName].rows) ? state.projects[projectName].rows : [];
    const focusedSection = getFocusedSection(projectName);
    if (!focusedSection) return rows;
    return rows.filter((row) => getRowSectionNumber(row) === focusedSection);
  }

  function getProjectShafts(projectName) {
    const shafts = Array.isArray(state.projects[projectName].shaftLocations) ? state.projects[projectName].shaftLocations : [];
    const focusedSection = getFocusedSection(projectName);
    if (!focusedSection) return shafts;
    return shafts.filter((row) => getRowSectionNumber(row) === focusedSection);
  }

  function setFocusSection(projectName, sectionNumber) {
    if (!projectName || projectName === 'ALL') return;
    if (!state.focusSections || typeof state.focusSections !== 'object') state.focusSections = {};
    const nextValue = String(sectionNumber || '').trim();
    if (nextValue) state.focusSections[projectName] = nextValue;
    else delete state.focusSections[projectName];
    saveState();
    renderProject(projectName);
    if (state.focus === projectName) {
      fitProject(projectName);
    }
  }

  function applyServerProjects(projects) {
    if (!projects || typeof projects !== 'object') return;
    PROJECTS.forEach(({ key, name }) => {
      const persisted = projects[key];
      state.projects[name] = persisted ? {
        rows: Array.isArray(persisted.rows) ? persisted.rows : [],
        completedRing: persisted.completedRing || '',
        fileName: persisted.fileName || '',
        shaftLocations: Array.isArray(persisted.shaftLocations) ? persisted.shaftLocations : []
      } : EMPTY_PROJECT_STATE();
    });
    saveState();
  }

  async function fetchServerProjects() {
    const response = await fetch('/api/ringmap/projects');
    if (!response.ok) throw new Error(`Failed to load ringmap state (${response.status})`);
    return response.json();
  }

  async function syncStateFromServer() {
    try {
      const payload = await fetchServerProjects();
      applyServerProjects(payload.projects);
    } catch (error) {
      console.warn('Ringmap server sync skipped:', error);
      loadState();
    }
  }

  async function persistProjectUpload(projectName, file) {
    const project = PROJECT_BY_NAME[projectName];
    if (!project) return;
    const rows = Array.isArray(state.projects[projectName].rows) ? state.projects[projectName].rows : [];
    console.log('[ringmap-upload]', project.key, 'parsed rows:', rows.length, rows.slice(0, 5));
    if (!rows.length) {
      throw new Error('No valid coordinate rows were parsed from the uploaded file.');
    }

    const response = await fetch(`/api/ringmap/projects/${project.key}/upload`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(buildRingUploadPayload(rows, {
        fileName: state.projects[projectName].fileName || file.name || `${project.key}.xlsx`,
        completedRing: state.projects[projectName].completedRing || ''
      }))
    });
    if (!response.ok) {
      const detail = await response.text();
      console.error('[ringmap-upload] server error', response.status, detail);
      throw new Error(`Upload save failed (${response.status}): ${detail}`);
    }
  }

  async function persistProjectUpdate(projectName) {
    const project = PROJECT_BY_NAME[projectName];
    if (!project) return;

    const response = await fetch(`/api/ringmap/projects/${project.key}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ completedRing: state.projects[projectName].completedRing || '' })
    });
    if (!response.ok) throw new Error(`Progress update failed (${response.status})`);
  }

  async function deleteProjectFromServer(projectName) {
    const project = PROJECT_BY_NAME[projectName];
    if (!project) return;

    const response = await fetch(`/api/ringmap/projects/${project.key}`, {
      method: 'DELETE'
    });
    if (!response.ok) throw new Error(`Project delete failed (${response.status})`);
  }

  function normalizeKey(key) {
    return String(key || '').trim().toLowerCase().replace(/\s+/g,'').replace(/[()_-]/g,'');
  }

  function detectColumn(keys, candidates) {
    const normalized = keys.map(k => ({ original: k, norm: normalizeKey(k) }));
    for (const c of candidates) {
      const found = normalized.find(k => k.norm.includes(c));
      if (found) return found.original;
    }
    return null;
  }

  function parseNumber(v) {
    if (v === null || v === undefined || v === '') return null;
    const s = String(v).replace(/,/g,'').trim();
    if (!s) return null;
    const n = Number(s);
    return Number.isFinite(n) ? n : null;
  }

  function buildRingUploadPayload(rows, meta = {}) {
    const segments = [];
    const segmentIndexByValue = new Map();
    const compactRows = rows.map((row) => {
      const sectionNumber = String(row.sectionNumber || row.segmentNumber || '').trim();
      if (sectionNumber && !segmentIndexByValue.has(sectionNumber)) {
        segmentIndexByValue.set(sectionNumber, segments.length);
        segments.push(sectionNumber);
      }
      return [
        segmentIndexByValue.has(sectionNumber) ? segmentIndexByValue.get(sectionNumber) : -1,
        row.ring ?? '',
        row.chainage || '',
        Number(row.lat),
        Number(row.lng),
        Number(row.sortRing ?? 0)
      ];
    });
    return {
      segments,
      compactRows,
      fileName: meta.fileName || '',
      completedRing: meta.completedRing || ''
    };
  }

  function parseRowsFromWorkbook(buffer) {
    const wb = XLSX.read(buffer, { type: 'array' });
    const rows = [];
    wb.SheetNames.forEach(sheetName => {
      const json = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval: '' });
      if (!json.length) return;
      const keys = Object.keys(json[0]);
      const segmentCol = detectColumn(keys, ['구간','세부구간','segmentnumber','segment','section']);
      const ringCol = detectColumn(keys, ['링번호','ringno','ringnumber','ringid','ring']);
      const chainCol = detectColumn(keys, ['체인리지','chainage','ch']);
      const latCol = detectColumn(keys, ['위도','latitude','lat']);
      const lngCol = detectColumn(keys, ['경도','longitude','lon','lng']);
      if (!latCol || !lngCol) return;

      json.forEach((row, idx) => {
        const lat = parseNumber(row[latCol]);
        const lng = parseNumber(row[lngCol]);
        if (lat === null || lng === null) return;
        const ringRaw = ringCol ? row[ringCol] : idx + 1;
        const chainRaw = chainCol ? row[chainCol] : '';
        rows.push({
          ring: ringRaw === '' ? idx + 1 : ringRaw,
          chainage: chainRaw,
          sectionNumber: segmentCol ? row[segmentCol] : '',
          segmentNumber: segmentCol ? row[segmentCol] : '',
          lat, lng,
          sortRing: extractRingNumber(ringRaw, idx + 1),
          sourceSheet: sheetName
        });
      });
    });
    rows.sort((a,b) => a.sortRing - b.sortRing);
    return rows;
  }

  function extractRingNumber(value, fallback) {
    const s = String(value ?? '').trim();
    const matched = s.match(/-?\d+(?:\.\d+)?/g);
    if (!matched) return fallback;
    const n = Number(matched[matched.length - 1]);
    return Number.isFinite(n) ? n : fallback;
  }

  function validatePreviewRows(projectName, rows) {
    const project = PROJECT_BY_NAME[projectName];
    const allowedSegments = new Set(project ? (PROJECT_SEGMENTS[project.key] || []) : []);
    return rows.map((row, index) => {
      const issues = [];
      const segmentNumber = String(row.segmentNumber || '').trim();
      if (!segmentNumber) {
        issues.push('구간값 없음');
      } else if (allowedSegments.size && !allowedSegments.has(segmentNumber)) {
        issues.push(`허용 구간 아님 (${segmentNumber})`);
      }
      if (!Number.isFinite(Number(row.lat)) || !Number.isFinite(Number(row.lng))) {
        issues.push('위도/경도 오류');
      }
      return {
        ...row,
        previewIndex: index + 1,
        segmentNumber,
        issues,
        isValid: issues.length === 0
      };
    });
  }

  function openUploadPreview(projectName, file, rows) {
    const overlay = document.getElementById('uploadPreviewOverlay');
    const title = document.getElementById('uploadPreviewTitle');
    const sub = document.getElementById('uploadPreviewSub');
    const summary = document.getElementById('uploadPreviewSummary');
    const note = document.getElementById('uploadPreviewNote');
    const tbody = document.getElementById('uploadPreviewRows');
    const footer = document.getElementById('uploadPreviewFooter');
    const validatedRows = validatePreviewRows(projectName, rows);
    const validRows = validatedRows.filter((row) => row.isValid).map(({ issues, isValid, previewIndex, ...rest }) => rest);
    const invalidRows = validatedRows.filter((row) => !row.isValid);
    pendingUploads[projectName] = { file, rows: validRows, validatedRows };

    title.textContent = `${projectName} 링좌표 업로드 미리보기`;
    sub.textContent = `${file.name} 파일에서 읽은 행을 확인한 뒤 서버에 저장합니다.`;
    summary.innerHTML = `
      <div class="upload-preview-box"><div class="k">전체 행</div><div class="v">${validatedRows.length}</div></div>
      <div class="upload-preview-box"><div class="k">유효 행</div><div class="v">${validRows.length}</div></div>
      <div class="upload-preview-box"><div class="k">오류 행</div><div class="v">${invalidRows.length}</div></div>
      <div class="upload-preview-box"><div class="k">허용 구간</div><div class="v" style="font-size:14px;">${(PROJECT_SEGMENTS[PROJECT_BY_NAME[projectName]?.key] || []).join(', ')}</div></div>
    `;
    note.textContent = invalidRows.length
      ? `오류 행 ${invalidRows.length}건은 서버 저장에서 제외됩니다. 구간값이 비어 있거나 현재 프로젝트 구간과 다르면 오류로 표시됩니다.`
      : '모든 행이 유효합니다. 아래 표를 확인한 뒤 서버 저장을 진행하세요.';
    footer.textContent = validRows.length
      ? `유효한 좌표 ${validRows.length}건을 서버에 저장합니다.`
      : '유효한 좌표가 없어 서버 저장을 진행할 수 없습니다.';
    tbody.innerHTML = validatedRows.slice(0, 200).map((row) => `
      <tr class="${row.isValid ? '' : 'upload-preview-row-invalid'}">
        <td>${row.previewIndex}</td>
        <td><span class="upload-preview-chip ${row.isValid ? 'valid' : 'invalid'}">${row.isValid ? '유효' : '오류'}</span></td>
        <td>${row.segmentNumber || '-'}</td>
        <td>${row.ring ?? '-'}</td>
        <td>${row.chainage || '-'}</td>
        <td>${row.lat ?? '-'}</td>
        <td>${row.lng ?? '-'}</td>
        <td>${row.issues.length ? row.issues.join(', ') : '확인 완료'}</td>
      </tr>
    `).join('');
    document.getElementById('uploadPreviewStatus').className = 'upload-preview-status';
    document.getElementById('uploadPreviewStatus').textContent = '';
    document.getElementById('uploadPreviewConfirm').disabled = !validRows.length;
    document.getElementById('uploadPreviewConfirm').dataset.projectName = projectName;
    overlay.classList.add('is-open');
    overlay.setAttribute('aria-hidden', 'false');
  }

  function closeUploadPreview() {
    const overlay = document.getElementById('uploadPreviewOverlay');
    const status = document.getElementById('uploadPreviewStatus');
    overlay.classList.remove('is-open');
    overlay.setAttribute('aria-hidden', 'true');
    status.className = 'upload-preview-status';
    status.textContent = '';
    delete document.getElementById('uploadPreviewConfirm').dataset.projectName;
  }

  function setUploadPreviewStatus(kind, message) {
    const status = document.getElementById('uploadPreviewStatus');
    status.className = `upload-preview-status is-open ${kind}`;
    status.textContent = message;
  }

  function ringStatus(index, rows, completedRing) {
    const completedNum = Number(completedRing);
    if (!Number.isFinite(completedNum)) return 'wait';
    const ringNum = rows[index].sortRing;
    if (ringNum <= completedNum) return 'done';
    const next = rows.find(r => r.sortRing > completedNum);
    if (next && next.sortRing === ringNum) return 'active';
    return 'wait';
  }

  function ringStyle(status, projectName) {
    const outline = PROJECT_COLORS[projectName] || COLORS.outline;
    return {
      color: outline,
      weight: status === 'active' ? 6 : 4.8,
      fillColor: status === 'done' ? COLORS.done : status === 'active' ? COLORS.active : COLORS.wait,
      fillOpacity: status === 'active' ? 0.88 : 0.72
    };
  }

  function projectStats(projectName) {
    const info = state.projects[projectName];
    const rows = info.rows || [];
    const total = rows.length;
    const completedNum = Number(info.completedRing);
    const done = Number.isFinite(completedNum) ? rows.filter(r => r.sortRing <= completedNum).length : 0;
    const active = Number.isFinite(completedNum) ? rows.find(r => r.sortRing > completedNum) : null;
    const progress = total ? ((done / total) * 100).toFixed(1) : '0.0';
    return { total, done, active, progress };
  }

  function projectPanelTemplate(projectKey, projectName) {

      <div class="panel" data-project-panel="${projectName}">

        </div>

          <label class="file-label" for="file-${projectKey}">엑셀 업로드</label>

          <button class="btn" data-focus-btn="${projectName}">지도 보기</button>
        </div>
        <div class="row">
          <input type="number" id="completed-${projectKey}" placeholder="완료 링 번호 예: 179" />
          <button class="btn primary" data-update="${projectName}">업데이트</button>
          <button class="btn" data-clear="${projectName}">삭제</button>
        </div>
        <div class="help" id="fileName-${projectKey}">업로드된 파일 없음</div>
        <div class="stats">
          <div class="stat"><div class="k">전체 링</div><div class="v" id="total-${projectKey}">0</div></div>
          <div class="stat"><div class="k">완료 링</div><div class="v" id="done-${projectKey}">0</div></div>
          <div class="stat"><div class="k">진척율</div><div class="v" id="progress-${projectKey}">0.0%</div></div>
          <div class="stat"><div class="k">진행중 링</div><div class="v" id="active-${projectKey}">-</div></div>
        </div>
      </div>`;
  }

  function renderPanels() {
    document.getElementById('projectPanels').innerHTML = PROJECTS.map(p => projectPanelTemplate(p.key, p.name)).join('');

    PROJECTS.forEach(({key, name}) => {
      const fileInput = document.getElementById(`file-${key}`);
      const completedInput = document.getElementById(`completed-${key}`);
      completedInput.value = state.projects[name].completedRing || '';

      fileInput.addEventListener('change', async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        try {
          const buffer = await file.arrayBuffer();
          const rows = parseRowsFromWorkbook(buffer);
          openUploadPreview(name, file, rows);
        } catch (err) {
          console.error('[ringmap] file parse error', err);
          alert(`파일을 읽는 중 오류가 발생했습니다.\n${err.message || err}`);
        } finally {
          fileInput.value = '';
        }
      });

      completedInput.addEventListener('change', () => {
        state.projects[name].completedRing = completedInput.value;
        saveState();
        renderProject(name);
      });
    });

    document.querySelectorAll('[data-update]').forEach(btn => btn.addEventListener('click', async () => {
      const name = btn.dataset.update;
      const key = PROJECT_BY_NAME[name]?.key;
      state.projects[name].completedRing = document.getElementById(`completed-${key}`).value;
      saveState();
      renderProject(name);
      try {
        await persistProjectUpdate(name);
      } catch (error) {
        console.warn(error);
        alert('진행 상태는 화면에 반영됐지만 서버 저장에는 실패했습니다.');
      }
    }));

    document.querySelectorAll('[data-clear]').forEach(btn => btn.addEventListener('click', async () => {
      const name = btn.dataset.clear;
      state.projects[name] = EMPTY_PROJECT_STATE();
      document.getElementById(`completed-${PROJECT_BY_NAME[name]?.key}`).value = '';
      saveState();
      renderProject(name);
      updateSummary();
      try {
        await deleteProjectFromServer(name);
      } catch (error) {
        console.warn(error);
        alert('화면에서는 삭제됐지만 서버 저장 파일 삭제에는 실패했습니다.');
      }
    }));

    document.querySelectorAll('[data-focus-btn]').forEach(btn => btn.addEventListener('click', () => {
      setFocus(btn.dataset.focusBtn);
      fitProject(btn.dataset.focusBtn);
    }));
  }

  function clearProjectLayers(projectName) {
    const g = groupByProject[projectName];
    g.root.clearLayers();
    g.circles = [];
    g.activeLabel = null;
    g.hoverTooltipTargets = [];
  }


  function clearActiveHighlights() {
    activeHighlightLayer.clearLayers();
  }

  /* ── 순차 링 투어 ── */
  let tourTimer = null;
  let tourOverlay = null;

  function stopTour() {
    if (tourTimer) { clearTimeout(tourTimer); tourTimer = null; }
    if (tourOverlay) { tourOverlay.remove(); tourOverlay = null; }
    clearActiveHighlights();
  }

  function getActiveRows() {
    const activeRows = [];
    PROJECTS.forEach(({name}) => {
      if (state.focus !== 'ALL' && state.focus !== name) return;
      const info = state.projects[name];
      const rows = getProjectRows(name);
      rows.forEach((row, idx) => {
        if (ringStatus(idx, rows, info.completedRing) === 'active') {
          activeRows.push({ projectName: name, row });
        }
      });
    });
    return activeRows;
  }

      fitAll();
    });

    // 진행바 애니메이션
    requestAnimationFrame(() => {
      const bar = document.getElementById('tourProgressBar');
      if (bar) {
        requestAnimationFrame(() => { bar.style.width = '100%'; });
      }
    });
  }

  function tourStep(activeRows, index) {
    if (!activeRows.length) return;
    const { projectName, row } = activeRows[index];

    // setView로 확실하게 줌 이동 (flyTo는 preferCanvas 환경에서 막힐 수 있음)
    console.log(`[Tour] step ${index} → ${projectName} 링${row.ring} [${row.lat}, ${row.lng}] zoom18`);
    map.setView([row.lat, row.lng], 18, { animate: true, duration: 0.8 });

    // 하이라이트 펄스
    clearActiveHighlights();
    const colorMap = { '교산':'#D9C400', '하남':'#D94A3A', '남한강':'#5FAE4E', '양평':'#4A78D1' };
    const color = colorMap[projectName] || '#60a5fa';

    const pulse = L.circleMarker([row.lat, row.lng], {
      radius: 18, color, weight: 3,
      fillColor: color, fillOpacity: 0.22, opacity: 1,
      interactive: false, pane: 'markerPane'
    }).addTo(activeHighlightLayer);

    const glow = L.circleMarker([row.lat, row.lng], {
      radius: 30, color, weight: 2,
      fillColor: color, fillOpacity: 0.06, opacity: 0.8,
      interactive: false, pane: 'markerPane'
    }).addTo(activeHighlightLayer);

    // 펄스 애니메이션
    let start = null;
    const animatePulse = (ts) => {
      if (!activeHighlightLayer.hasLayer(pulse)) return;
      if (!start) start = ts;
      const wave = Math.sin(((ts - start) % 1100) / 1100 * Math.PI);
      pulse.setRadius(16 + wave * 6);
      pulse.setStyle({ fillOpacity: 0.18 + wave * 0.22 });
      glow.setRadius(28 + wave * 12);
      glow.setStyle({ opacity: 0.3 + wave * 0.5 });
      requestAnimationFrame(animatePulse);
    };
    requestAnimationFrame(animatePulse);

    // 오버레이 표시
    showTourOverlay(projectName, row, index, activeRows.length);

    // 3.5초 후 다음 링으로
    tourTimer = setTimeout(() => {
      const next = (index + 1) % activeRows.length;
      tourStep(activeRows, next);
    }, 3500);
  }

  function startTour() {
    stopTour();
    map.invalidateSize(); // iframe 크기 재계산
    const activeRows = getActiveRows();
    if (!activeRows.length) {
      console.warn('[Tour] 진행중인 링이 없습니다.');
      return;
    }
    console.log('[Tour] 시작, 진행중 링:', activeRows.length, activeRows);
    tourStep(activeRows, 0);
  }

  function highlightActiveRings(durationMs = 5000) {
    clearActiveHighlights();
    const activeRows = [];
    PROJECTS.forEach(({name}) => {
      if (state.focus !== 'ALL' && state.focus !== name) return;
      const info = state.projects[name];
      const rows = getProjectRows(name);
      rows.forEach((row, idx) => {
        if (ringStatus(idx, rows, info.completedRing) === 'active') {
          activeRows.push({ projectName: name, row });
        }
      });
    });
    if (!activeRows.length) return;

    activeRows.forEach(({ projectName, row }) => {
      const pulse = L.circleMarker([row.lat, row.lng], {
        radius: 14,
        color: '#60a5fa',
        weight: 3,
        fillColor: '#60a5fa',
        fillOpacity: 0.18,
        opacity: 1,
        interactive: false,
        pane: 'markerPane'
      }).addTo(activeHighlightLayer);

      const glow = L.circleMarker([row.lat, row.lng], {
        radius: 22,
        color: '#93c5fd',
        weight: 2,
        fillColor: '#93c5fd',
        fillOpacity: 0.08,
        opacity: 0.9,
        interactive: false,
        pane: 'markerPane'
      }).addTo(activeHighlightLayer);

      pulse.bindTooltip(`<div><b>${projectName}</b><br>진행중 링: ${row.ring}<br>체인리지: ${row.chainage || '-'}</div>`, {
        permanent: true,
        direction: 'top',
        className: 'ring-hover',
        opacity: 1,
        offset: [0, -14]
      }).openTooltip();

      let start = null;
      const maxRadius = 32;
      const minRadius = 14;
      const animate = (ts) => {
        if (!activeHighlightLayer.hasLayer(pulse)) return;
        if (start === null) start = ts;
        const elapsed = ts - start;
        const cycle = (elapsed % 1100) / 1100;
        const wave = Math.sin(cycle * Math.PI);
        pulse.setRadius(minRadius + wave * 5);
        pulse.setStyle({ fillOpacity: 0.18 + wave * 0.18, opacity: 0.85 + wave * 0.15 });
        glow.setRadius(22 + wave * 10);
        glow.setStyle({ opacity: 0.35 + wave * 0.45, fillOpacity: 0.04 + wave * 0.08 });
        if (elapsed < durationMs) {
          requestAnimationFrame(animate);
        } else {
          clearActiveHighlights();
        }
      };
      requestAnimationFrame(animate);
    });
  }

  function renderProject(projectName) {
    clearProjectLayers(projectName);
    const info = state.projects[projectName];
    const rows = getProjectRows(projectName);
    const shaftLocations = getProjectShafts(projectName);
    const g = groupByProject[projectName];

    rows.forEach((row, idx) => {
      const status = ringStatus(idx, rows, info.completedRing);
      const circle = L.circle([row.lat, row.lng], { radius: 2, ...ringStyle(status, projectName) }).addTo(g.root);
      if (status === 'active') {
        circle.getElement?.()?.classList.add('ring-blink');
      }
      circle.on('add', () => {
        if (status === 'active' && circle.getElement()) circle.getElement().classList.add('ring-blink');
      });

      const hoverCircle = L.circle([row.lat, row.lng], {
        radius: 9,
        stroke: false,
        fill: true,
        fillOpacity: 0.001,
        interactive: true
      }).addTo(g.root);

      hoverCircle.bindTooltip(
        `<div><b>${projectName}</b><br>링번호: ${row.ring}<br>체인리지: ${row.chainage || '-'}<br>상태: ${status === 'done' ? '완료' : status === 'active' ? '진행중' : '대기'}</div>`,
        { direction: 'top', sticky: true, className: 'ring-hover', opacity: 1 }
      );

      if (status === 'active') {
        g.activeLabel = L.marker([row.lat, row.lng], {
          interactive: false,
          icon: L.divIcon({
            className: '',
            html: `<div class="active-label"><strong>${projectName} 진행중</strong><br>링번호: ${row.ring}<br>체인리지: ${row.chainage || '-'}</div>`,
            iconSize: [140, 52],
            iconAnchor: [70, 68]
          })
        }).addTo(g.root);
      }

      g.circles.push(circle);
      g.hoverTooltipTargets.push(hoverCircle);
    });

    shaftLocations.forEach((row) => {
      if (!Number.isFinite(Number(row.lat)) || !Number.isFinite(Number(row.lng))) return;
      const marker = L.circleMarker([row.lat, row.lng], {
        radius: 8,
        color: '#f97316',
        weight: 3,
        fillColor: '#fff7ed',
        fillOpacity: 0.95
      }).addTo(g.root);
      marker.bindTooltip(
        `<div><b>${projectName}</b><br>${row.shaftDisplayName || row.shaftName || '수직구'}<br>구간: ${row.segmentNumber || '-'}</div>`,
        { direction: 'top', sticky: true, className: 'ring-hover', opacity: 1 }
      );
    });

    updatePanelStats(projectName);
    applyFocusVisibility();
    updateSummary();
  }

  function fitProject(projectName) {
    const rows = getProjectRows(projectName);
    const shafts = getProjectShafts(projectName).filter(r => Number.isFinite(Number(r.lat)) && Number.isFinite(Number(r.lng)));
    const points = rows.map(r => [r.lat, r.lng]).concat(shafts.map(r => [r.lat, r.lng]));
    if (!points.length) return;
    const bounds = L.latLngBounds(points);
    map.fitBounds(bounds.pad(0.3));
  }

  function fitAll() {
    const allRows = Object.values(state.projects).flatMap(p => p.rows || []);
    const allShafts = Object.values(state.projects).flatMap(p => (p.shaftLocations || []).filter(r => Number.isFinite(Number(r.lat)) && Number.isFinite(Number(r.lng))));
    const points = allRows.map(r => [r.lat, r.lng]).concat(allShafts.map(r => [r.lat, r.lng]));
    if (!points.length) return;
    const bounds = L.latLngBounds(points);
    map.fitBounds(bounds.pad(0.15));
  }

  function setFocus(projectName) {
    state.focus = projectName;
    saveState();
    document.querySelectorAll('[data-focus]').forEach(btn => btn.classList.toggle('active', btn.dataset.focus === projectName));
    applyFocusVisibility();
    if (projectName === 'ALL') fitAll();
    else fitProject(projectName);
  }

  function applyFocusVisibility() {
    for (const name of Object.keys(groupByProject)) {
      const visible = state.focus === 'ALL' || state.focus === name;
      const root = groupByProject[name].root;
      if (visible) {
        if (!map.hasLayer(root)) root.addTo(map);
      } else {
        if (map.hasLayer(root)) map.removeLayer(root);
      }
    }
  }

  function updatePanelStats(projectName) {
    const info = state.projects[projectName];
    const stats = projectStats(projectName);
    const key = PROJECT_BY_NAME[projectName]?.key;
    document.getElementById(`badge-${key}`).textContent = info.rows.length ? '업로드됨' : '미업로드';
    document.getElementById(`fileName-${key}`).textContent = info.fileName ? `${info.fileName}` : '업로드된 파일 없음';
    document.getElementById(`total-${key}`).textContent = stats.total;
    document.getElementById(`done-${key}`).textContent = stats.done;
    document.getElementById(`progress-${key}`).textContent = `${stats.progress}%`;
    document.getElementById(`active-${key}`).textContent = stats.active ? stats.active.ring : '-';
  }

  function updateSummary() {
    const allRows = Object.values(state.projects).flatMap(p => p.rows || []);
    const total = allRows.length;
    let done = 0;
    let activeCount = 0;
    PROJECTS.forEach(({name}) => {
      const s = projectStats(name);
      done += s.done;
      if (s.active) activeCount += 1;
    });
    const progress = total ? ((done / total) * 100).toFixed(1) : '0.0';
    document.getElementById('summaryBar').innerHTML = `
      <div class="box"><div class="label">총 링 수</div><div class="value">${total}</div></div>
      <div class="box"><div class="label">완료 링</div><div class="value">${done}</div></div>
      <div class="box"><div class="label">평균 진척율</div><div class="value">${progress}%</div></div>
      <div class="box"><div class="label">진행중 현장</div><div class="value">${activeCount}</div></div>`;
  }

  document.getElementById('btnSatellite').addEventListener('click', () => setBasemap('sat'));
  document.getElementById('btnRoad').addEventListener('click', () => setBasemap('map'));

  const sidebar = document.querySelector('.sidebar');
  const sidebarToggle = document.getElementById('sidebarToggle');
  function setSidebarCollapsed(collapsed){
    if (!sidebar) return;
    sidebar.classList.toggle('is-collapsed', !!collapsed);
    if (sidebarToggle) sidebarToggle.textContent = collapsed ? '☰' : '✕';
    if (sidebarToggle) sidebarToggle.title = collapsed ? '사이드바 열기' : '사이드바 닫기';
  }
  if (sidebarToggle) {
    setSidebarCollapsed(false);
    sidebarToggle.addEventListener('click', () => setSidebarCollapsed(!sidebar.classList.contains('is-collapsed')));
  }

  function fitActiveRings() {
    const activePoints = [];
    PROJECTS.forEach(({name}) => {
      const info = state.projects[name];
      const rows = info.rows || [];
      rows.forEach((row, idx) => {
        if (ringStatus(idx, rows, info.completedRing) === 'active') {
          activePoints.push([row.lat, row.lng]);
        }
      });
    });
    if (!activePoints.length) return;
    const bounds = L.latLngBounds(activePoints);
    map.fitBounds(bounds.pad(1.2), { animate: true, duration: 0.8 });
  }

  window.addEventListener('message', (event) => {
    const data = event.data || {};
    if (data.type === 'tcsms-basemap') setBasemap(data.value === 'map' ? 'map' : 'sat');
    if (data.type === 'tcsms-fit-all') fitAll();
    if (data.type === 'tcsms-focus-project') {
      const projectName = String(data.value || 'ALL');
      if (projectName === 'ALL' || PROJECTS.some(project => project.name === projectName)) {
        setFocus(projectName);
      }
    }
    if (data.type === 'tcsms-focus-section') {
      const projectName = String(data.projectName || '');
      if (PROJECTS.some(project => project.name === projectName)) {
        setFocusSection(projectName, data.value || '');
      }
    }
    if (data.type === 'tcsms-zoom-active' || data.type === 'tcsms-fit-active') {
      setTimeout(() => fitActiveRings(), 80);
    }
    if (data.type === 'tcsms-tour-start') startTour();
    if (data.type === 'tcsms-tour-stop') { stopTour(); fitAll(); }
    if (data.type === 'tcsms-highlight-active') highlightActiveRings(Number(data.duration) || 5000);
    if (data.type === 'tcsms-theme') {
      applyRingmapTheme(data.value !== 'light');
    }
    if (data.type === 'tcsms-load-all') {
      syncStateFromServer().then(() => {
        renderPanels();
        PROJECTS.forEach(({name}) => renderProject(name));
        const targetProjectName = String(data.projectName || 'ALL');
        const targetSectionNumber = String(data.sectionNumber || '');
        if (targetProjectName !== 'ALL' && PROJECTS.some(project => project.name === targetProjectName)) {
          setFocus(targetProjectName);
          if (targetSectionNumber) {
            setFocusSection(targetProjectName, targetSectionNumber);
          }
        } else {
          setFocus('ALL');
        }
      });
    }
    if (data.type === 'tcsms-sidebar') setSidebarCollapsed(data.value === 'close');
  });
  document.getElementById('btnFitAll').addEventListener('click', fitAll);
  document.getElementById('uploadPreviewClose').addEventListener('click', closeUploadPreview);
  document.getElementById('uploadPreviewCancel').addEventListener('click', closeUploadPreview);
  document.getElementById('uploadPreviewOverlay').addEventListener('click', (event) => {
    if (event.target.id === 'uploadPreviewOverlay') closeUploadPreview();
  });
  document.getElementById('uploadPreviewConfirm').addEventListener('click', async (event) => {
    const projectName = event.currentTarget.dataset.projectName;
    const pending = pendingUploads[projectName];
    if (!projectName || !pending) return;
    const confirmButton = event.currentTarget;
    confirmButton.disabled = true;
    confirmButton.textContent = '저장 중...';
    setUploadPreviewStatus('info', '서버에 업로드 데이터를 저장하고 있습니다. 잠시만 기다려 주세요.');
    state.projects[projectName].rows = pending.rows;
    state.projects[projectName].fileName = pending.file.name;
    saveState();
    renderProject(projectName);
    fitProject(projectName);
    try {
      await persistProjectUpload(projectName, pending.file);
      setUploadPreviewStatus('success', `서버 저장이 완료되었습니다. ${pending.rows.length}건이 반영되었습니다.`);
      confirmButton.textContent = '저장 완료';
      closeUploadPreview();
      delete pendingUploads[projectName];
    } catch (error) {
      console.warn(error);
      setUploadPreviewStatus('error', `서버 저장에 실패했습니다. ${error.message}`);
      confirmButton.disabled = false;
      confirmButton.textContent = '서버 저장';
      return;
    }
    confirmButton.disabled = false;
    confirmButton.textContent = '서버 저장';
  });
  document.getElementById('btnClearAll').addEventListener('click', async () => {
    if (!confirm('교산, 하남, 남한강, 양평 업로드 데이터를 모두 초기화할까요?')) return;
    for (const name of Object.keys(state.projects)) state.projects[name] = EMPTY_PROJECT_STATE();
    saveState();
    renderPanels();
    PROJECTS.forEach(({name}) => renderProject(name));
    setFocus('ALL');
    try {
      await Promise.all(PROJECTS.map(project => deleteProjectFromServer(project.name)));
    } catch (error) {
      console.warn(error);
      alert('화면에서는 전체 삭제됐지만 서버 저장 파일 일부 삭제에 실패했습니다.');
    }
  });
  document.querySelectorAll('[data-focus]').forEach(btn => btn.addEventListener('click', () => setFocus(btn.dataset.focus)));

  setBasemap(initialBasemap);
  syncStateFromServer().then(() => {
    renderPanels();
    PROJECTS.forEach(({name}) => renderProject(name));
    setFocus('ALL');
    setTimeout(() => {
      const hasAny = Object.values(state.projects).some(p => (p.rows || []).length);
      if (hasAny) {
        fitAll();
        highlightActiveRings(5000);
      }
    }, 100);
  });
</script>
</body>
</html>
